# Ablation 1/3 — LoRA ViT-B, no sampler, no augmentation.
# Isolates the gain of LoRA fine-tuning over the frozen baseline.
experiment_name: lora_b_plain
seed: 42
device: auto

model_type: dinov2_vitb14_reg
finetune_mode: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_targets: [qkv, proj]

img_size: 224
val_split: 0.2
augment: false
sampler: none
occ_power: 0.5

loss: balanced
epochs: 20
batch_size: 64           # safe on 40GB; raise to 256 on 80GB (and scale LR ~x2)
head_lr: 1.0e-3
backbone_lr: 2.0e-4
weight_decay: 1.0e-4
scheduler: cosine
warmup_frac: 0.05
grad_accum: 1
clip_grad: 0.0
amp: true
num_workers: 8
tta: false
